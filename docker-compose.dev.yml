version: '3.9'

# ==============================================================
# FibraNet ISP — Docker Compose DESARROLLO (hot-reload)
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ==============================================================

services:

  postgres:
    ports:
      - "5432:5432"      # Exponer en dev para acceso directo

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      target: development
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    command: npm run start:dev
    ports:
      - "3000:3000"      # API directa en dev

  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:3000

  nginx:
    ports:
      - "80:80"
    # Sin SSL en desarrollo

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fibranet_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fibranet.pe
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - fibranet_internal
    depends_on:
      - postgres

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: fibranet_redis_ui
    environment:
      REDIS_HOSTS: "redis:redis:6379:0:${REDIS_PASSWORD:-devpassword}"
    ports:
      - "8081:8081"
    networks:
      - fibranet_internal
    depends_on:
      - redis
