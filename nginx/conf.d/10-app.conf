# ==============================================================
# CRM ISP DATAFAST — Virtual Host Principal (app.tudominio.com)
# Panel administrativo + API + WebSocket
# Reemplazar "tudominio.com" con el dominio real
# ==============================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.tudominio.com;

    # ── SSL Certificates ──────────────────────────────────────
    # Opción 1: Let's Encrypt (recomendado producción)
    ssl_certificate     /etc/nginx/ssl/live/app.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/app.tudominio.com/privkey.pem;
    # Opción 2: Certificado propio (desarrollo/staging)
    # ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    # ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # ── HSTS ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Content Security Policy ───────────────────────────────
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com; "
        "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; "
        "font-src 'self' https://fonts.gstatic.com; "
        "img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com; "
        "connect-src 'self' wss://app.tudominio.com https://api.mercadopago.com; "
        "frame-ancestors 'none';"
        always;

    # ── Rate limiting conexiones ──────────────────────────────
    limit_conn conn_limit 20;

    # ── Logs por vhost ────────────────────────────────────────
    access_log /var/log/nginx/app_access.log json_combined;
    error_log  /var/log/nginx/app_error.log warn;

    # ── Test de conexión MikroTik: rate limit estricto ───────────
    location /api/v1/mikrotik/test-connection {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ═══════════════════════════════════════════════════════════
    # API REST — /api/*
    # ═══════════════════════════════════════════════════════════
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        # Headers estándar proxy
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        # Keepalive
        proxy_set_header Connection "";

        # Timeouts API
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Cache headers para API (sin cache)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Auth endpoints: rate limit MÁS estricto ───────────────
    location /api/auth/login {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /api/auth/refresh {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Webhooks (MercadoPago, WhatsApp) ──────────────────────
    location /api/webhooks/ {
        limit_req zone=webhooks burst=5 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Webhooks pueden tener payloads grandes
        client_max_body_size 5M;
    }

    # ═══════════════════════════════════════════════════════════
    # WEBSOCKET — /socket.io/* y /ws/*
    # ═══════════════════════════════════════════════════════════
    location /socket.io/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;

        # WebSocket upgrade — OBLIGATORIO
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket necesita timeouts largos (conexión persistente)
        proxy_read_timeout 86400s;    # 24 horas
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;

        # Sin buffering para WebSocket
        proxy_buffering off;
        proxy_cache off;

        # Sin rate limit en WS (ya autenticado por JWT)
    }

    # ═══════════════════════════════════════════════════════════
    # SWAGGER / API DOCS — solo en staging, bloquear en producción
    # ═══════════════════════════════════════════════════════════
    location /api/docs {
        # Descomentar para bloquear en producción:
        # allow 192.168.1.0/24;    # Solo red interna
        # deny all;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ═══════════════════════════════════════════════════════════
    # UPLOADS / ARCHIVOS ESTÁTICOS
    # ═══════════════════════════════════════════════════════════
    location /uploads/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Cache agresivo para archivos estáticos
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";

        # Solo GET para uploads
        limit_except GET { deny all; }
    }

    # ═══════════════════════════════════════════════════════════
    # FRONTEND Next.js — todo lo demás
    # ═══════════════════════════════════════════════════════════
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://frontend_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── Next.js HMR WebSocket (solo en dev) ───────────────────
    location /_next/webpack-hmr {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    # ── Next.js static assets (cache largo) ───────────────────
    location /_next/static/ {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Bloquear acceso a archivos sensibles ──────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(env|log|sql|bak|sh)$ {
        deny all;
        return 404;
    }

    # ── Health check (sin logs) ───────────────────────────────
    location /health {
        proxy_pass http://backend_api/health;
        access_log off;
    }
}
