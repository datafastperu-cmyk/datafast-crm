# ==============================================================
# FibraNet ISP — Portal del Cliente (portal.tudominio.com)
# Subdominio separado para autogestión del cliente
# ==============================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portal.tudominio.com;

    ssl_certificate     /etc/nginx/ssl/live/portal.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/portal.tudominio.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Rate limit más estricto para portal (clientes externos)
    limit_conn conn_limit 10;

    access_log /var/log/nginx/portal_access.log json_combined;
    error_log  /var/log/nginx/portal_error.log warn;

    # API del portal — solo endpoints autorizados para clientes
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        # Solo permitir endpoints del portal del cliente
        location ~ ^/api/(auth|portal|facturas|pagos|tickets|consumo) {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Portal-Request  "true";
            proxy_set_header Connection "";
        }

        # Bloquear cualquier otro endpoint de API
        return 403;
    }

    location /api/auth/login {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /socket.io/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
    }

    location / {
        limit_req zone=general burst=15 nodelay;
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /_next/static/ {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~ /\. { deny all; return 404; }
}
