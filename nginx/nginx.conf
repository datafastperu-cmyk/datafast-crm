# ==============================================================
# FibraNet ISP — nginx.conf principal
# ==============================================================

user nginx;
worker_processes auto;                        # Detecta CPUs automáticamente
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── MIME types ────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────
    log_format main
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        '$request_time $upstream_response_time';

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"ip":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"duration":$request_time,'
            '"ua":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;                         # Ocultar versión nginx

    # ── Buffer sizes ──────────────────────────────────────────
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    client_max_body_size 20M;                  # Para uploads (fotos, PDFs)
    large_client_header_buffers 4 8k;

    # ── Timeouts ──────────────────────────────────────────────
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    gzip_min_length 1024;
    gzip_disable "msie6";

    # ── Rate Limiting ──────────────────────────────────────────
    # Límite general por IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    # Límite estricto para login/auth
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # Límite para API
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    # Límite para webhooks de pago
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=10r/s;

    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_status 429;

    # ── SSL Global ────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers globales ─────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # ── Upstream services ─────────────────────────────────────
    upstream backend_api {
        server backend:3000;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:3001;
        keepalive 16;
    }

    # ── Mapa WebSocket upgrade ────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Incluir virtual hosts ─────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
