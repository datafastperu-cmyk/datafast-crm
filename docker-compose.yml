version: '3.9'

# ══════════════════════════════════════════════════════════════════════
#  CRM ISP DATAFAST — Docker Compose de Producción
#  Uso: docker compose up -d
# ══════════════════════════════════════════════════════════════════════

networks:
  datafast-internal:
    driver: bridge
    internal: true                    # La red interna no tiene acceso externo
  datafast-public:
    driver: bridge                    # Solo Nginx está en esta red

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  app-logs:
    driver: local
  certbot-conf:
    driver: local
  certbot-www:
    driver: local
  evolution-data:
    driver: local

x-restart-policy: &restart-policy
  restart: unless-stopped

x-healthcheck-defaults: &hc-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: datafast-postgres
    <<: *restart-policy
    networks:
      - datafast-internal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${DB_NAME:-datafast_db}
      POSTGRES_USER:     ${DB_USER:-datafast_db_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerida}
      TZ:                America/Lima
    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-datafast_db_user} -d ${DB_NAME:-datafast_db}"]
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c max_connections=100
      -c log_timezone=America/Lima
      -c timezone=America/Lima
    deploy:
      resources:
        limits:   { memory: 1G }
        reservations: { memory: 256M }
    # Sin exposición de puertos al exterior
    expose: ["5432"]

  # ── Redis 7 ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: datafast-redis
    <<: *restart-policy
    networks:
      - datafast-internal
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD requerida}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --loglevel warning
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
    deploy:
      resources:
        limits:   { memory: 768M }
    expose: ["6379"]

  # ── Backend NestJS ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      args:
        - NODE_VERSION=20
    image: datafast/backend:${DATAFAST_VERSION:-latest}
    container_name: datafast-backend
    <<: *restart-policy
    networks:
      - datafast-internal
    volumes:
      - app-logs:/app/logs
    env_file: ./backend/.env.production
    environment:
      NODE_ENV:           production
      DATABASE_HOST:      postgres
      REDIS_HOST:         redis
      TZ:                 America/Lima
      OLT_SERVICE_URL:    http://olt-automation-service:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health"]
      start_period: 60s
    deploy:
      replicas: 2                     # 2 réplicas para alta disponibilidad
      resources:
        limits:   { cpus: '1', memory: 1G }
        reservations: { memory: 256M }
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    expose: ["4000"]

  # ── Frontend Next.js ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    image: datafast/frontend:${DATAFAST_VERSION:-latest}
    container_name: datafast-frontend
    <<: *restart-policy
    networks:
      - datafast-internal
    env_file: ./frontend/.env.production
    environment:
      NODE_ENV: production
      PORT:     3000
      TZ:       America/Lima
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
    deploy:
      resources:
        limits:   { cpus: '0.5', memory: 512M }
    expose: ["3000"]
    networks:
      - datafast-internal

  # ── Nginx + SSL ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: datafast-nginx
    <<: *restart-policy
    networks:
      - datafast-internal
      - datafast-public
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
      - /var/log/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "nginx", "-t"]

  # ── Certbot (renovación SSL automática) ───────────────────────────
  certbot:
    image: certbot/certbot
    container_name: datafast-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Intenta renovar cada 12 horas
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait;
        done
      "
    depends_on:
      - nginx

  # ── OLT Automation Service (Python/FastAPI) ──────────────────────
  olt-automation-service:
    build:
      context: ./olt-automation-service
      dockerfile: Dockerfile
      target: production
    image: datafast/olt-automation-service:${DATAFAST_VERSION:-latest}
    container_name: datafast-olt
    <<: *restart-policy
    networks:
      - datafast-internal
    cap_add:
      - NET_RAW          # icmplib: envío de paquetes ICMP raw
    environment:
      TZ:              America/Lima
      DEBUG:           "false"
      ALLOWED_ORIGINS: "http://backend:4000"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      start_period: 30s
    deploy:
      resources:
        limits:       { memory: 256M }
        reservations: { memory: 64M }
    expose: ["8001"]

  # ── Evolution API (WhatsApp self-hosted) ─────────────────────────
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: datafast-evolution
    <<: *restart-policy
    networks:
      - datafast-internal
    ports:
      - "127.0.0.1:8080:8080"           # Sólo accesible desde el host (PM2 backend)
    volumes:
      - evolution-data:/evolution/instances
    environment:
      SERVER_URL:               http://localhost:8080
      AUTHENTICATION_API_KEY:   ${EVOLUTION_API_KEY:?EVOLUTION_API_KEY requerida}
      AUTHENTICATION_TYPE:      apikey
      STORE_MESSAGES:           "false"
      STORE_MESSAGE_UP:         "false"
      STORE_CONTACTS:           "false"
      DEL_INSTANCE:             "false"
      LOG_LEVEL:                WARN
      TZ:                       America/Lima
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      start_period: 20s
    deploy:
      resources:
        limits: { memory: 512M }
    expose: ["8080"]

  # ── Watchtower (actualizaciones automáticas de imágenes) ──────────
